# ─── Inference defaults ────────────────────────────────────────────────────────
inference:
  conf_threshold:  0.25
  iou_threshold:   0.45
  max_det:         10        # scales per image rarely exceed a handful
  imgsz:           1280
  # Tiling: large plats are tiled before inference and results are merged
  tile_size:       1280
  tile_overlap:    0.2

# ─── Output ────────────────────────────────────────────────────────────────────
output:
  weights_dir: "weights"
  runs_dir:    "runs"
  export_format: "onnx"     # format for model export: onnx | torchscript | coreml
