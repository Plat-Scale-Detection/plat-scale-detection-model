# ─── Model architecture ────────────────────────────────────────────────────────
model:
  # YOLOv8 variant: n (nano), s (small), m (medium), l (large), x (extra-large)
  # Start with 'n' or 's' for faster iteration; upgrade as dataset grows.
  base: "yolov8s.pt"       # pre-trained COCO weights to fine-tune from
  num_classes: 1
  class_names:
    - graphical_scale

# ─── Dataset ───────────────────────────────────────────────────────────────────
dataset:
  path: "datasets/latest"   # relative to repo root; overridable via CLI
  train_split: "images/train"
  val_split:   "images/val"

# ─── Training hyperparameters ──────────────────────────────────────────────────
training:
  epochs:      100
  imgsz:       1280          # large input size suits high-res engineering drawings
  batch:       8             # reduce if GPU OOM; use -1 for auto-batch
  patience:    20            # early stopping patience (epochs without improvement)
  optimizer:   "AdamW"
  lr0:         0.001
  lrf:         0.01
  momentum:    0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  cos_lr:      true
  augment:     true
  # Augmentation tuning for engineering drawings (less distortion, more flips)
  degrees:     5.0           # rotation ±5°
  translate:   0.1
  scale:       0.3
  shear:       2.0
  flipud:      0.0
  fliplr:      0.5
  mosaic:      0.5
  mixup:       0.1

# ─── Inference defaults ────────────────────────────────────────────────────────
inference:
  conf_threshold:  0.25
  iou_threshold:   0.45
  max_det:         10        # scales per image rarely exceed a handful
  imgsz:           1280
  # Tiling: large plats are tiled before inference and results are merged
  tile_size:       1280
  tile_overlap:    0.2

# ─── Output ────────────────────────────────────────────────────────────────────
output:
  weights_dir: "weights"
  runs_dir:    "runs"
  export_format: "onnx"     # format for model export: onnx | torchscript | coreml
